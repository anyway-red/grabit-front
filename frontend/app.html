<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIY Live Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Hidden canvas for capturing video frames -->
        <canvas id="hidden-canvas" style="display: none;"></canvas>
        
        <video id="camera-feed" autoplay playsinline muted></video>
        
        <div class="ui-overlay minimal-box">
            <div class="header">
                <h1>DIY Fix Assistant</h1>
                <div class="status-badge">
                    <div id="status-indicator" class="status-indicator"></div>
                    <span id="status-text">Disconnected</span>
                </div>
            </div>

            <div class="token-inline">
                <span class="token-label">Tokens:</span>
                <span id="token-display" class="token-value">---</span>
                <a href="refill.html" class="link-btn">Refill +</a>
            </div>

            <div class="controls">
                <button id="start-btn" class="btn btn-primary">Start Live Session</button>
                <button id="stop-btn" class="btn btn-danger" style="display: none;">End Session</button>
                <button id="flip-btn" class="btn btn-secondary" style="display: none;">Flip Camera</button>
            </div>
            
            <div id="error-message" style="color: var(--danger); font-size: 0.875rem; display: none;"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
